<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7cffd4;
      --accent2: #ff6b6b;
      --text: #e8e8f0;
      --muted: #5a5a7a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,255,212,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,255,212,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    .container {
      width: 100%;
      max-width: 540px;
      position: relative;
      z-index: 1;
    }

    .tag {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tag::before {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 2.5rem;
      letter-spacing: 0.05em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .field {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,255,212,0.08);
    }

    textarea { min-height: 110px; }

    select option { background: var(--bg); }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.85rem;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,255,212,0.2); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 0.78rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .status.success {
      display: flex;
      background: rgba(124,255,212,0.08);
      border: 1px solid rgba(124,255,212,0.25);
      color: var(--accent);
    }

    .status.error {
      display: flex;
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.25);
      color: var(--accent2);
    }

    .server-url {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(124,255,212,0.04);
      border: 1px dashed var(--border);
      border-radius: 8px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .server-url strong { color: var(--accent); display: block; margin-bottom: 0.3rem; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; }

    .server-url input {
      background: transparent;
      border: none;
      padding: 0;
      font-size: 0.75rem;
      color: var(--text);
      margin-top: 0.3rem;
    }

    .server-url input:focus { box-shadow: none; border: none; }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      display: inline-block;
      animation: pulse 2s infinite;
    }

    .dot.connected { background: var(--accent); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="tag">Formulaire de contact</div>
  <h1>Envoie<br/>moi un <span>message</span></h1>
  <p class="subtitle">// les données arrivent directement dans ton terminal</p>

  <div class="card">
    <div class="row">
      <div class="field">
        <label>Prénom</label>
        <input type="text" id="prenom" placeholder="Jean" />
      </div>
      <div class="field">
        <label>Nom</label>
        <input type="text" id="nom" placeholder="Dupont" />
      </div>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="jean@exemple.com" />
    </div>

    <div class="field">
      <label>Sujet</label>
      <select id="sujet">
        <option value="">— choisir —</option>
        <option>Question générale</option>
        <option>Collaboration</option>
        <option>Projet</option>
        <option>Autre</option>
      </select>
    </div>

    <div class="field">
      <label>Message</label>
      <textarea id="message" placeholder="Ton message ici…"></textarea>
    </div>

    <button class="btn" id="sendBtn" onclick="envoyerFormulaire()">
      <span>Envoyer</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>

    <div class="status" id="statusBox"></div>
  </div>

  <!-- Config URL serveur -->
  <div class="server-url">
    <strong><span class="dot" id="statusDot"></span>&nbsp; URL de ton serveur Python</strong>
    <input type="text" id="serverUrl" value="http://localhost:5000/submit" placeholder="http://localhost:5000/submit" />
    <div style="margin-top:0.4rem; opacity:0.6">Modifie l'URL si tu utilises ngrok ou un autre tunnel.</div>
  </div>
</div>

<script>
  async function envoyerFormulaire() {
    const btn = document.getElementById('sendBtn');
    const statusBox = document.getElementById('statusBox');
    const serverUrl = document.getElementById('serverUrl').value.trim();

    const data = {
      prenom:  document.getElementById('prenom').value.trim(),
      nom:     document.getElementById('nom').value.trim(),
      email:   document.getElementById('email').value.trim(),
      sujet:   document.getElementById('sujet').value,
      message: document.getElementById('message').value.trim(),
      date:    new Date().toLocaleString('fr-FR')
    };

    if (!data.prenom || !data.email || !data.message) {
      showStatus('error', '⚠ Prénom, email et message sont requis.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span>Envoi…</span>';

    try {
      const res = await fetch(serverUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        showStatus('success', '✓ Message envoyé ! Vérifie ton terminal.');
        document.getElementById('statusDot').classList.add('connected');
        // Reset
        ['prenom','nom','email','message'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('sujet').value = '';
      } else {
        showStatus('error', `✗ Erreur serveur : ${res.status}`);
      }
    } catch (e) {
      showStatus('error', '✗ Impossible de joindre le serveur. Lance ton script Python !');
    }

    btn.disabled = false;
    btn.innerHTML = '<span>Envoyer</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  }

  function showStatus(type, msg) {
    const box = document.getElementById('statusBox');
    box.className = 'status ' + type;
    box.textContent = msg;
  }
</script>
</body>
</html>
